# Reject packages published less than 7 days ago (supply chain protection)
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@hyperlane-xyz/*'
overrides:
  tronweb>ethers: ^6.13.5
  '@solana/web3.js': ^1.95.4
  axios: ^1.7.9
  bignumber: 9.1.2
  bn.js: ^5.2
  cosmjs-types: '0.9'
  ethers: ^5.8.0
  globals: ^14.0.0
  lit-html: 2.8.0
  react-fast-compare: ^3.2
  viem: ^2.21.41
  zustand: ^4.4
  sha.js: 2.4.12
  cipher-base: 1.0.5
  elliptic: 6.6.1
  pbkdf2: 3.1.3
  form-data: 4.0.4
  '@ledgerhq/errors': 6.31.0
patchedDependencies:
  starknetkit@2.6.1: patches/starknetkit@2.6.1.patch
  '@provablehq/wasm@0.9.18': patches/@provablehq__wasm@0.9.18.patch
  '@provablehq/sdk@0.9.15': patches/@provablehq__sdk@0.9.15.patch
allowBuilds:
  '@sentry/cli': false
  bigint-buffer: false
  bufferutil: false
  core-js: false
  esbuild: false
  keccak: false
  protobufjs: false
  secp256k1: false
  sharp: false
  tiny-secp256k1: false
  utf-8-validate: false
